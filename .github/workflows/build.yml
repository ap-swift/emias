name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed `
            --name "EMIAS_Check" `
            --add-data "emias_check/templates/report.html;emias_check/templates" `
            run_gui.pyw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMIAS_Check
          path: dist/EMIAS_Check.exe
